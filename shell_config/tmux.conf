##### =========================
#####   基础设置
##### =========================

# 减少按键延迟（提升 Vim/Tmux 切换体验）
set -g escape-time 0

# 窗口/面板编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# 启用鼠标支持
set -g mouse on

# 默认 shell
set -g default-shell /bin/zsh

# 系统剪贴板支持
set -g set-clipboard on


##### =========================
#####   终端能力（真彩 + UTF-8）
##### =========================

# 继承 UTF-8 locale
set -g update-environment "LANG LC_ALL LC_CTYPE"

set -g assume-paste-time 0
set -g display-panes-active-colour default
set -g display-panes-colour default
set -g pane-border-format "#{pane_index} #{pane_title}"
set -g pane-border-status off

# 使用 tmux 自己的 terminfo
set -g default-terminal "tmux-256color"

# 外部终端支持 RGB
set -as terminal-overrides ',xterm-256color:RGB'
set -as terminal-overrides ',tmux-256color:RGB'


##### =========================
#####   键位与行为
##### =========================

# 使用 C-x 作为前缀键
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# Vim 风格复制模式
set -g status-keys vi
set -g mode-keys vi

# 新窗口/分屏继承当前路径
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"

# 快速切换窗口
bind ',' select-window -p
bind '.' select-window -n
bind a last


##### =========================
#####   自动命名（命令限长 + 最后一级目录）
##### =========================

set -g automatic-rename on
set -g automatic-rename-format "#(ps -o comm= -p #{pane_pid} | cut -c1-12) ┆ #{b:pane_current_path}"

##### =========================
#####   状态栏（美化版）
##### =========================

# 刷新频率
set -g status-interval 1

# 左右对齐方式
set -g status-justify left

# 活动提示
setw -g monitor-activity on
set -g visual-activity on

# 状态栏整体样式（Catppuccin 风格）
set -g status-style "bg=#1e1e1e,fg=#c0c0c0"

# 左侧：Session + Window
set -g status-left-length 60
set -g status-left "#[fg=#89b4fa,bold]   #S "

# 右侧：Prefix + CPU + RAM + Net + Time
set -g status-right-length 120
set -g status-right "\
#[fg=#f38ba8]#{prefix_highlight} \
#[fg=#6c7086]│ #[fg=#fab387] #{cpu_percentage} \
#[fg=#6c7086]│ #[fg=#a6e3a1] #{ram_percentage} \
#[fg=#6c7086]│ #[fg=#89b4fa] #{net_speed} \
#[fg=#6c7086]│ #[fg=#cdd6f4]%H:%M \
"

# 窗口列表样式
setw -g window-status-format " #[fg=#6c7086]#I:#W "
setw -g window-status-current-format " #[fg=#f9e2af,bold]#I:#W#F "
setw -g window-status-current-style "bg=#313244"
setw -g window-status-last-style "fg=#443CE7"

# 提示消息样式
set -g message-style "bg=#313244,fg=#cdd6f4"


##### =========================
#####   Prefix Highlight
##### =========================

set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg '#f38ba8'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=#f9e2af'


##### =========================
#####   TPM 插件管理
##### =========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-net-speed'

# 会话保存/恢复
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '60'
set -g @continuum-restore 'on'
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-shell-history 'on'
set -g @resurrect-processes '"nvim->nvim +SLoad"'


##### =========================
#####   自动安装 TPM
##### =========================

if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

